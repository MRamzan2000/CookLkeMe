name: cooklkeme
description: "A Flutter application built with GetX and MVC architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

# ---------------- DEPENDENCIES ----------------
dependencies:
  flutter:
    sdk: flutter

  # UI & Core
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  responsive_sizer: ^3.3.1
  google_fonts: ^8.1.0
  animate_do: ^5.1.0
  # State Management
  get: ^4.7.3
  video_player: ^2.11.1



# ---------------- DEV DEPENDENCIES ----------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


  # ---------------- ASSETS ----------------
  assets:
    - assets/images/
    - assets/icons/
    - assets/videos/
    - assets/fonts/

  # ---------------- FONTS (optional) ----------------
